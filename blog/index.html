<!doctype html>
<html lang="ko">
<head>
<script>try{var t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%97%93%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<title>연차 이야기 - 실제 사례와 노무 상식 모음 | 직장인 연차 계산기</title>
<meta name="description" content="연차휴가와 관련된 실제 사례, 자주 헷갈리는 노무 상식을 지속적으로 정리하는 코너입니다." />
<link rel="canonical" href="https://annual-leave-calculator.pages.dev/blog/" />
<link rel="stylesheet" href="/style.css" />
<style>
  .blog-controls {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .blog-search {
    width: 100%;
    padding: 0.65rem 0.9rem;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 0.95rem;
    font-family: var(--font-body);
  }
  .blog-search:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .category-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .category-chip {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    border-radius: 999px;
    padding: 0.35rem 0.85rem;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .category-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 12%, var(--card));
  }
  .post-count {
    font-size: 0.82rem;
    color: var(--muted-2);
    margin: 0 0 1rem;
  }
  .no-results {
    color: var(--muted);
    padding: 2rem 0;
    text-align: center;
    display: none;
  }
  .no-results.visible { display: block; }
</style>
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <a class="brand" href="/">직장인 연차 계산기</a>
      <nav class="site-nav">
        <a href="/">연차 계산기</a>
        <a href="/guide.html">연차휴가 가이드</a>
        <a href="/blog/" class="active">연차 이야기</a>
        <a href="/about.html">소개</a>
        <a href="/contact.html">문의</a>
      </nav>
      <button id="themeToggle" class="theme-toggle" aria-label="테마 전환"></button>
    </div>
  </header>

  <main>
    <h1 class="page-title">연차 이야기</h1>
    <p class="page-lead">
      연차휴가를 둘러싼 실제 사례와 자주 헷갈리는 노무 상식을 매주 정리해서
      올리는 코너입니다. 궁금한 상황이 있다면 <a href="/contact.html">문의</a>로
      보내주세요. 다음 글의 소재가 될 수 있습니다.
    </p>

    <div class="blog-controls">
      <input type="text" id="blogSearch" class="blog-search" placeholder="제목이나 내용으로 검색 (예: 무급휴직, 퇴사, 알바)" />
      <div class="category-chips" id="categoryChips">
        <button type="button" class="category-chip active" data-category="all">전체</button>
      </div>
    </div>

    <p class="post-count" id="postCount"></p>
    <ul id="postList" style="list-style:none; padding:0;"></ul>
    <p class="no-results" id="noResults">조건에 맞는 글이 없습니다. 검색어나 카테고리를 바꿔보세요.</p>
  </main>

  <footer class="site-footer">
    <nav>
      <a href="/about.html">소개</a>
      <a href="/privacy.html">개인정보처리방침</a>
      <a href="/terms.html">이용약관</a>
      <a href="/contact.html">문의</a>
    </nav>
    <p>&copy; 2026 직장인 연차 계산기. 본 사이트의 계산 결과는 참고용이며 법적 효력이 없습니다.</p>
  </footer>
<script src="/theme.js"></script>
<script>
  let allPosts = [];
  let activeCategory = "all";

  function formatDate(iso) {
    return iso.replace(/-/g, ".");
  }

  function render() {
    const query = document.getElementById("blogSearch").value.trim().toLowerCase();
    const filtered = allPosts.filter(function (p) {
      const matchesCategory = activeCategory === "all" || p.category === activeCategory;
      const matchesQuery = !query ||
        p.title.toLowerCase().includes(query) ||
        p.summary.toLowerCase().includes(query) ||
        p.category.toLowerCase().includes(query);
      return matchesCategory && matchesQuery;
    });

    const list = document.getElementById("postList");
    list.innerHTML = filtered.map(function (p) {
      return '<li class="card">' +
        '<span class="post-category-badge">' + p.category + '</span>' +
        '<h2 style="margin-top:0;"><a href="/blog/' + p.slug + '.html">' + p.title + '</a></h2>' +
        '<p style="color: var(--muted); margin-bottom:0.25rem;">' + formatDate(p.date) + '</p>' +
        '<p style="margin:0;">' + p.summary + '</p>' +
        '</li>';
    }).join("");

    document.getElementById("postCount").textContent = "전체 " + allPosts.length + "편 중 " + filtered.length + "편 표시";
    document.getElementById("noResults").classList.toggle("visible", filtered.length === 0);
  }

  function buildCategoryChips() {
    const categories = Array.from(new Set(allPosts.map(function (p) { return p.category; })));
    const container = document.getElementById("categoryChips");
    categories.forEach(function (cat) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "category-chip";
      btn.dataset.category = cat;
      btn.textContent = cat;
      container.appendChild(btn);
    });

    container.addEventListener("click", function (e) {
      const btn = e.target.closest(".category-chip");
      if (!btn) return;
      activeCategory = btn.dataset.category;
      container.querySelectorAll(".category-chip").forEach(function (b) {
        b.classList.toggle("active", b === btn);
      });
      render();
    });
  }

  fetch("/blog/posts.json")
    .then(function (res) { return res.json(); })
    .then(function (posts) {
      allPosts = posts.slice().sort(function (a, b) { return b.date.localeCompare(a.date); });
      buildCategoryChips();
      render();
    })
    .catch(function () {
      document.getElementById("postList").innerHTML = "<li>글 목록을 불러오지 못했습니다.</li>";
    });

  document.getElementById("blogSearch").addEventListener("input", render);
</script>
</body>
</html>
